<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>課堂任務完成排序工具 (即時同步版)</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --danger: #dc2626;
        --ok: #059669;
        --border: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container { max-width: 900px; margin: 0 auto; padding: 20px; }
      h1 { margin: 0 0 12px; font-size: 1.8rem; }
      .lead { margin: 0 0 18px; color: var(--muted); }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .card h2 { margin: 0 0 12px; font-size: 1.15rem; }
      form { display: grid; gap: 10px; }
      label { display: grid; gap: 5px; font-size: 0.95rem; }
      input, button { font: inherit; }
      input {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 10px;
        width: 100%;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        background: var(--primary);
        color: white;
        font-weight: 600;
      }
      button.danger { background: var(--danger); }
      button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .status { margin-top: 8px; min-height: 1.4em; color: var(--muted); }
      .status.ok { color: var(--ok); }
      .status.error { color: var(--danger); }
      table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
      th, td { border-bottom: 1px solid var(--border); text-align: left; padding: 8px 6px; }
      th { font-weight: 700; color: #111827; }
      .muted { color: var(--muted); font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>課堂任務完成排序工具 <small style="font-size: 0.5em; vertical-align: middle; color: #059669;">● 即時連線中</small></h1>
      <p class="lead">全班同步顯示：學生完成任務後輸入資料，名次將即時更新在下方清單。</p>

      <section class="card">
        <h2>學生登入完成任務</h2>
        <form id="checkin-form">
          <label>
            學號
            <input id="student-id" required maxlength="30" placeholder="例如 A11001" />
          </label>
          <label>
            姓名
            <input id="student-name" required maxlength="30" placeholder="例如 王小明" />
          </label>
          <div class="actions">
            <button type="submit" id="submit-btn">完成任務，送出排名</button>
          </div>
          <p class="status" id="checkin-status"></p>
        </form>
      </section>

      <section class="card">
        <h2>已完成名單（依完成時間）</h2>
        <table>
          <thead>
            <tr>
              <th>名次</th>
              <th>學號</th>
              <th>姓名</th>
              <th>完成時間</th>
            </tr>
          </thead>
          <tbody id="completed-body"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>教師管理（清除排行榜）</h2>
        <form id="teacher-form">
          <label>
            教師密碼
            <input id="teacher-password" type="password" placeholder="請輸入教師密碼" />
          </label>
          <div class="actions">
            <button type="submit">驗證教師身分</button>
            <button type="button" class="danger" id="clear-all" disabled>清除目前排行榜</button>
          </div>
          <p class="status" id="teacher-status"></p>
        </form>
      </section>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, push, onValue, set, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // ⚠️ 請在此處貼上你的 Firebase 設定 (從 Firebase Console 取得)
     const firebaseConfig = {
  apiKey: "AIzaSyA9vLJI2rVWD0H1Nv0cNcZqmjID-AK_6fM",
  authDomain: "class-task-tracker.firebaseapp.com",
  databaseURL: "https://class-task-tracker-default-rtdb.firebaseio.com",
  projectId: "class-task-tracker",
  storageBucket: "class-task-tracker.firebasestorage.app",
  messagingSenderId: "689765180935",
  appId: "1:689765180935:web:fab82f02723980be57aca2",
  measurementId: "G-RWS36Y1RZ4"
};

      // 初始化 Firebase
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const taskRef = ref(db, 'classroom_tasks');

      const TEACHER_PASSWORD = "teacher123";
      let currentRecords = []; 
      let teacherVerified = false;

      const checkinForm = document.getElementById("checkin-form");
      const studentIdInput = document.getElementById("student-id");
      const studentNameInput = document.getElementById("student-name");
      const checkinStatus = document.getElementById("checkin-status");
      const completedBody = document.getElementById("completed-body");

      const teacherForm = document.getElementById("teacher-form");
      const teacherPasswordInput = document.getElementById("teacher-password");
      const teacherStatus = document.getElementById("teacher-status");
      const clearAllBtn = document.getElementById("clear-all");

      // --- 即時監聽資料庫變化 ---
      onValue(taskRef, (snapshot) => {
        const data = snapshot.val();
        currentRecords = [];
        
        if (data) {
          // 將 Firebase 的物件格式轉為陣列
          currentRecords = Object.keys(data).map(key => ({
            firebaseKey: key,
            ...data[key]
          }));
          // 依照完成時間排序
          currentRecords.sort((a, b) => a.completedAt - b.completedAt);
        }
        render(currentRecords);
      });

      // --- 學生送出邏輯 ---
      checkinForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const id = studentIdInput.value.trim();
        const name = studentNameInput.value.trim();

        if (!id || !name) {
          setStatus(checkinStatus, "請輸入學號與姓名", "error");
          return;
        }

        // 檢查是否重複
        const exists = currentRecords.find((item) => item.id === id);
        if (exists) {
          const rank = currentRecords.findIndex((item) => item.id === id) + 1;
          setStatus(checkinStatus, `你已送出過，名次為第 ${rank} 名`, "error");
          return;
        }

        // 推送到 Firebase
        push(taskRef, {
          id: id,
          name: name,
          completedAt: Date.now()
        }).then(() => {
          setStatus(checkinStatus, `送出成功！`, "ok");
          checkinForm.reset();
        }).catch((err) => {
          setStatus(checkinStatus, "系統錯誤，請聯絡老師", "error");
          console.error(err);
        });
      });

      // --- 教師管理邏輯 ---
      teacherForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (teacherPasswordInput.value === TEACHER_PASSWORD) {
          teacherVerified = true;
          clearAllBtn.disabled = false;
          setStatus(teacherStatus, "教師驗證成功，可清除排行榜。", "ok");
          teacherPasswordInput.value = "";
          return;
        }
        teacherVerified = false;
        clearAllBtn.disabled = true;
        setStatus(teacherStatus, "密碼錯誤。", "error");
      });

      clearAllBtn.addEventListener("click", () => {
        if (!teacherVerified) return;
        if (!window.confirm("確定要清除所有人的進度嗎？（不可復原）")) return;
        
        // 清空 Firebase 資料庫該節點
        set(taskRef, null).then(() => {
          setStatus(teacherStatus, "已清除資料庫", "ok");
          setStatus(checkinStatus, "", "");
        });
      });

      // --- 介面渲染 ---
      function render(records) {
        completedBody.innerHTML = "";

        if (records.length === 0) {
          completedBody.innerHTML = '<tr><td colspan="4" class="muted">尚無學生送出</td></tr>';
          return;
        }

        records.forEach((item, index) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${escapeHtml(item.id)}</td>
            <td>${escapeHtml(item.name)}</td>
            <td>${formatTime(item.completedAt)}</td>
          `;
          completedBody.appendChild(tr);
        });
      }

      function setStatus(el, message, type) {
        el.textContent = message;
        el.className = "status";
        if (type) el.classList.add(type);
      }

      function formatTime(ts) {
        return new Date(ts).toLocaleString("zh-TW", { hour12: false });
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
